<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container">

<div class="card">

<h1>User Registration</h1>

<p>
Register your voice profile by entering a unique username
and uploading a voice sample.
</p>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        <div class="flash {{ category }}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}
{% endwith %}

<form method="POST"
      enctype="multipart/form-data">

<label>Username</label>

<input
type="text"
name="username"
placeholder="Enter username"
required>

<label>Voice Sample</label>

<input
type="file"
name="audiofile"
accept=".wav,.mp3"
required>

<button type="submit">
Register
</button>

</form>

<div class="nav">

<a href="{{ url_for('home') }}">
← Back to Home
</a>

</div>

</div>

</div>

</body>

</html>
